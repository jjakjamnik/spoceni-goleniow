<script>
document.addEventListener("DOMContentLoaded", function () {

    function countFlags(container) {
        const flags = container.querySelectorAll(".flag");
        const missing = container.querySelectorAll(".flag.missing");
        return flags.length - missing.length;
    }

    const homeBox = document.querySelectorAll(".flags-table")[0];
    const awayBox = document.querySelectorAll(".flags-table")[1];

    const totalHome = homeBox.querySelectorAll(".flag").length;
    const totalAway = awayBox.querySelectorAll(".flag").length;

    const ownedHome = countFlags(homeBox);
    const ownedAway = countFlags(awayBox);

    document.getElementById("home-title").innerHTML =
        `🏠 Home Flags (${ownedHome}/${totalHome})`;

    document.getElementById("away-title").innerHTML =
        `✈️ Away Flags (${ownedAway}/${totalAway})`;

});
</script>
